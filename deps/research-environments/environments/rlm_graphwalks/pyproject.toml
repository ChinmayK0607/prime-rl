[project]
name = "rlm-graphwalks"
description = "GraphWalks graph traversal evaluation environment using RLM with Python REPL"
tags = ["multi-turn", "rlm", "sandbox", "long-context", "python", "repl", "graph"]
version = "0.2.3"
requires-python = ">=3.10"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "prime-sandboxes>=0.2.21",
    "datasets>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
