[project]
name = "rlm-mrcr-v2"
description = "MRCR v2 long-context evaluation environment using RLM with Python REPL"
tags = ["multi-turn", "rlm", "sandbox", "long-context", "python", "repl"]
version = "0.2.3"
requires-python = ">=3.10"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "prime-sandboxes>=0.2.21",
    "datasets>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
force-include = { "download.sh" = "download.sh" }

[tool.hatch.build.targets.sdist]
include = ["rlm_mrcr_v2.py", "download.sh", "pyproject.toml", "README.md"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
