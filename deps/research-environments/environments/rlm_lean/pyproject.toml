[project]
name = "rlm-lean"
description = "RLM agent on Lean 4 theorem proving (v1 taskset/harness, reuses lean-code's LeanTaskset)."
tags = ["lean", "theorem-proving", "multi-turn", "sandbox", "rlm", "v1"]
version = "0.2.1"
requires-python = ">=3.11"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "lean-code>=0.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rlm_lean"]

[project.entry-points."verifiers.environments"]
rlm-lean = "rlm_lean:load_environment"

[tool.uv.sources]
lean-code = { path = "../lean_code", editable = true }

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
