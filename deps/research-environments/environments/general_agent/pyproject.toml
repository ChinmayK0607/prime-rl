[project]
name = "general-agent"
description = "A self-growing toolbench environment - early signs of self-improving agentic capability"
tags = ["agent", "multi-turn", "tool-use"]
version = "0.1.4"
requires-python = ">=3.10"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "tyro>=0.9",
    "mcp>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
general-agent = "general_agent.cli:main"

[tool.hatch.build.targets.wheel]
packages = [
    "general_agent",
    "general_agent_solver_local.py",
    "general_agent_solver_opencode.py",
    "general_agent_solver_rlm.py",
    "general_agent_synth.py",
    "tasks",
]

[project.entry-points."verifiers.envs"]
general-agent = "general_agent.solver.local:load_environment"
general-agent-solver-local = "general_agent.solver.local:load_environment"
general-agent-solver-opencode = "general_agent.solver.opencode:load_environment"
general-agent-solver-rlm = "general_agent.solver.rlm:load_environment"
general-agent-synth = "general_agent.synthesizer:load_environment"

[project.optional-dependencies]
dev = ["ruff", "ty"]
test = ["pytest", "pytest-asyncio"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
