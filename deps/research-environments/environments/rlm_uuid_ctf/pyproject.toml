[project]
name = "rlm-uuid-ctf"
description = "RLM sandbox CTF environment for recovering a derived UUID token from hidden shard identifiers."
tags = ["multi-turn", "rlm", "sandbox", "ctf", "data-forensics"]
version = "0.1.1"
requires-python = ">=3.10"
dependencies = [
    "datasets>=4.0.0",
    "prime-sandboxes>=0.2.21",
    "verifiers[packages]>=0.1.15.dev17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rlm_uuid_ctf"]

[tool.verifiers.eval]
num_examples = 1
rollouts_per_example = 8
