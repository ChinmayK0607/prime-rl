[project]
name = "rlm-longcot"
description = "LongCoT long-horizon reasoning evaluation environment using RLM with Python REPL"
tags = ["multi-turn", "rlm", "sandbox", "reasoning", "python", "repl", "math", "logic", "chemistry", "chess", "cs"]
version = "0.2.4"
requires-python = ">=3.10"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "prime-sandboxes>=0.2.21",
    "datasets>=4.0.0",
    "longcot @ git+https://github.com/LongHorizonReasoning/longcot.git@6a569ab",
    "httpx",
    "openai",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
