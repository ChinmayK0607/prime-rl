[project]
name = "rlm-oolong-pairs"
description = "Oolong-Pairs long-context pairwise-aggregation RLM environment using a Python REPL"
tags = ["multi-turn", "rlm", "sandbox", "long-context", "python", "repl", "aggregation"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.14",
    "prime-sandboxes>=0.2.21",
    "datasets>=4.0.0",
    "huggingface-hub",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
