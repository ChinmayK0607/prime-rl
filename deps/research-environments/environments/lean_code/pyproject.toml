[project]
name = "lean-code"
description = "Lean 4 theorem proving environment (v1 taskset/harness)"
tags = ["lean4", "theorem-proving", "multi-turn", "agentic", "sandbox", "v1"]
version = "0.2.1"
requires-python = ">=3.11"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "datasets>=2.0.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lean_code"]

[project.entry-points."verifiers.environments"]
lean-code = "lean_code:load_environment"

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
