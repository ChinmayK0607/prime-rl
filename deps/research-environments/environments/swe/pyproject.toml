[project]
name = "swe"
description = "SWE tasks (R2E-Gym, SWE-bench, ...)."
tags = ["swe", "multi-turn", "sandbox"]
version = "0.3.5"
requires-python = ">=3.10"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "prime-sandboxes>=0.2.23",
    "swebench==4.1.0",
    "multi-swe-bench>=1.1.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["swe"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
