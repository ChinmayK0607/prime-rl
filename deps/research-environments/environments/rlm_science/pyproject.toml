[project]
name = "rlm-science"
description = "RLM agent solving science problems via ComposableEnv."
tags = ["science", "multi-turn", "sandbox", "rlm"]
version = "0.1.3"
requires-python = ">=3.10"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rlm_science"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
