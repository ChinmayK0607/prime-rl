[project]
name = "rlm-skill-open-webpage"
version = "0.1.0"
description = "Fetch a URL summary via Exa."
requires-python = ">=3.10"
dependencies = ["exa_py", "rlm"]

[project.scripts]
open_webpage = "rlm.skill:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/open_webpage"]
