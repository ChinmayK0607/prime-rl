[project]
name = "opencode-math"
description = "Solve math problems using OpenCode agent via ComposableEnv."
tags = ["math", "opencode", "multi-turn"]
version = "0.4.13"
requires-python = ">=3.10"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17,<0.1.15.dev150",
    "math-verify>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencode_math"]
