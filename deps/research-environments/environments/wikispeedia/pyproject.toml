[project]
name = "wikispeedia"
version = "0.2.1"
description = "Navigate Wikipedia articles by following hyperlinks to reach a target article"
tags = ["wikispeedia", "navigation", "search", "multi-turn", "tool-use", "v1"]
requires-python = ">=3.11,<3.13"
dependencies = [
    "verifiers>=0.1.15.dev18",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.verifiers.eval]
num_examples = 1000
rollouts_per_example = 4
