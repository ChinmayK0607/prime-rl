[project]
name = "nl2repobench"
version = "0.1.0"
description = "Verifiers composable taskset for NL2RepoBench repository-generation tasks."
tags = ["eval", "cli_agent", "coding", "repository-generation", "taskset"]
requires-python = ">=3.11"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "datasets>=2.16",
    "prime-sandboxes>=0.2.19",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["nl2repobench.py", "README.md", "pyproject.toml", "test_files/**/*"]

[tool.verifiers.eval]
num_examples = 1
rollouts_per_example = 1
