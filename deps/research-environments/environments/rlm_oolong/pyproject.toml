[project]
name = "rlm-oolong"
description = "Oolong long-context evaluation environment using RLM with Python REPL"
tags = ["multi-turn", "rlm", "sandbox", "long-context", "python", "repl"]
version = "0.2.5"
requires-python = ">=3.10"
dependencies = [
    "python-dateutil>=2.9",
    "verifiers[packages]>=0.1.15.dev17",
    "prime-sandboxes>=0.2.21",
    "datasets>=4.0.0",
    "openai",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
