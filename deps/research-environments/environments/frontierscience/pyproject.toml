[project]
name = "frontierscience"
description = "FrontierScience PhD-level science evaluation environment"
tags = ["science", "single-turn", "llm-judge", "eval"]
version = "0.1.4"
requires-python = ">=3.11"
dependencies = [
    "datasets>=4.0.0",
    "openai>=1.0.0",
    "verifiers>=0.1.15.dev17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["frontierscience.py", "README.md", "pyproject.toml"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
