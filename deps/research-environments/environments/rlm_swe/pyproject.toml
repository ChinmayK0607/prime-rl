[project]
name = "rlm-swe"
description = "RLM agent on SWE tasks (R2E-Gym, SWE-bench)."
tags = ["swe", "multi-turn", "sandbox", "rlm"]
version = "0.4.4"
requires-python = ">=3.10"
dependencies = [
    "verifiers[packages]>=0.1.15.dev17",
    "prime-sandboxes>=0.2.19",
    "swebench==4.1.0",
    "multi-swe-bench>=1.1.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rlm_swe"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
