[project]
name = "forth-lang"
description = "Forth code-execution environment"
version = "0.3.0"
requires-python = ">=3.12"
tags = ["multi-turn", "coding", "sandbox", "forth", "tool-use"]
dependencies = [
    "prime-sandboxes>=0.2.19",
    "verifiers>=0.1.15.dev9",
    "datasets>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forth_lang"]
