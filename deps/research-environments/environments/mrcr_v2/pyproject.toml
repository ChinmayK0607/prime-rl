[project]
name = "mrcr-v2"
description = "MRCR v2 single-turn long-context evaluation environment"
tags = ["long-context", "single-turn", "eval"]
version = "0.1.1"
requires-python = ">=3.11"
dependencies = [
    "verifiers>=0.1.15.dev17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = ["mrcr_v2.py", "pyproject.toml", "README.md"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 1
