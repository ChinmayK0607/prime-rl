# RUN 13 — ARM B (CISPO). 3-way provider task (CLAUDE / CHATGPT / GEMINI), Qwen3.5-9B,
# thinking OFF. Single 8x H100: 4 train (FSDP, HF impl) + 4 inference (vLLM tp=2 => dp=2).
#
# Hypothesis. The GEMINI collapse is an OPTIMIZATION pathology, not a data ceiling. prime-rl's
# default loss is DPPO: it DROPS the gradient (keep_mask) on any token whose probability moved
# past a trust-region threshold. Those are exactly the rare, high-advantage tokens that lift an
# under-represented class -- e.g. the GEMINI answer-label token the moment the policy starts to
# sample it. Cutting that gradient right when the class begins to recover is a core driver of
# the collapse. CISPO (MiniMax-M1) NEVER masks: it clips only the importance-sampling WEIGHT
# and stop-gradients it, so the per-token gradient sg(clip(rho))*A*grad log pi FLOWS for every
# trainable token while the clipped weight still bounds off-policy variance. ScaleRL's 400k-
# GPU-hour study found CISPO best/most-robust asymptotically. Only the UPPER clip eps_high=0.28
# is active (eps_low set large, as in MiniMax/DAPO). It has no verbosity incentive (unlike the
# entropy bonus), so it should be both higher AND more stable than Run 12.
#
# Single-variable change vs the entropy incumbent: SAME PvG curriculum, SAME non-greedy val,
# SAME budget, default GRPO advantage (r - mean); ONLY the loss changes (entropy custom loss ->
# CISPO custom loss). JUDGE BY per-class/macro recall, not train reward.

max_steps = 40
seq_len = 16384

[model]
name = "Qwen/Qwen3.5-9B"

[deployment]
type = "single_node"
num_train_gpus = 4
num_infer_gpus = 4

[inference.parallel]
tp = 2

[inference.model]
max_model_len = 16384
reasoning_parser = "None"

[trainer.model]
impl = "hf"
fused_lm_head_token_chunk_size = "auto"

[trainer.model.ac]
mode = "full"

[trainer.optim]
type = "adamw"
lr = 1e-6

# CISPO loss: clip the IS weight (upper eps_high=0.28, lower inactive) + stop-gradient, NO
# token masking -> gradient flows on every trainable token, including the rare-class tokens
# the DPPO trust region would have dropped. Kimi mismatch-KL kept (kl_tau=1e-3) for drift.
[trainer.loss]
type = "custom"
import_path = "prime_rl.trainer.rl.loss.cispo_loss_fn"
kwargs = { eps_low = 10.0, eps_high = 0.28, adv_tau = 1.0, kl_tau = 1e-3 }

[orchestrator]
batch_size = 144
group_size = 12

[orchestrator.renderer]
name = "qwen3.5"
enable_thinking = false

[orchestrator.train.sampling]
temperature = 1.0
max_completion_tokens = 4096

[[orchestrator.train.env]]
id = "blog-author-id"
name = "blog-train"
args = { split = "train", data_dir = "/home/ubuntu/blogger/prime-rl/data/blog_author_id_pvg", label_scheme = "provider3" }

# Non-greedy val (temp 0.7 / top_p 0.95): greedy loops on long blogs and never emits <answer>
# (56-78% truncation), structurally suppressing GEMINI recall. Temp 0.7 breaks it.
[orchestrator.eval]
interval = 4
group_size = 2

[orchestrator.eval.sampling]
temperature = 0.7
top_p = 0.95
max_completion_tokens = 4096

[[orchestrator.eval.env]]
id = "blog-author-id"
name = "blog-val"
args = { split = "val", data_dir = "/home/ubuntu/blogger/prime-rl/data/blog_author_id_pvg", label_scheme = "provider3" }

[wandb]
project = "blog-author-id-rl"
name = "qwen3.5-9b-grpo-3way-pvg-cispo"

# Weights-only checkpoints (~17 GB), aligned to eval interval so the best-val janitor can map
# a reward to each weights dir. Retention owned by scripts/ckpt_janitor.sh.
[ckpt]
interval = 4

[trainer.ckpt]
weights_only = true
