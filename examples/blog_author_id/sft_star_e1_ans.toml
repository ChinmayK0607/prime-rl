# E1: STaR self-distillation SFT (thinking OFF).
# Distills the model's OWN verifier-gated reasoning (NO per-example gold label shown
# during generation; gold only verifier-gates). Plain-correct + cheatsheet-hinted-correct
# trajectories, class-balanced to 357/class = 1071 samples. Contrast vs sft_warmup.toml
# (gold-conditioned teacher). Body<=3000tok/seq4096.
# Launch: uv run sft @ examples/blog_author_id/sft_star_e1.toml
output_dir = "outputs/sft_star_e1_ans"
max_steps = 200
clean_output_dir = true

[model]
name = "Qwen/Qwen3.5-9B"
attn = "flash_attention_2"
impl = "hf"
fused_lm_head_token_chunk_size = "auto"

[model.ac]  # full activation checkpointing
mode = "full"

# Qwen3.5 renderer with thinking disabled (matches eval + RL parity).
[renderer]
name = "qwen3.5"
enable_thinking = false

[data]
type = "sft"
name = "data/blog_sft_star_e1_ans_trunc"
seq_len = 4096
batch_size = 16
micro_batch_size = 1
pack_function = "stack"  # pad each sample to seq_len; no cross-sample attention bleed
shuffle = true

[optim]
lr = 1e-5
weight_decay = 0.01

[scheduler]
type = "cosine"
warmup_steps = 20

[ckpt]
interval = 40
weights_only = true

[deployment]
type = "single_node"
num_gpus = 8
